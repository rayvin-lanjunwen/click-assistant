plugins {
    id "com.android.application"
}

android {
    namespace "com.clickassistant.mobile"
    compileSdk 37

    defaultConfig {
        applicationId "com.clickassistant.mobile"
        minSdk 24
        targetSdk 37
        versionCode 1
        versionName "0.1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}
